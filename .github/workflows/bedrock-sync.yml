name: Check Bedrock & Add-ons upstream & bump (minecraftserver)

on:
  schedule:
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-minecraftserver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Query Mojang API Bedrock
        id: upstream
        run: |
          set -euo pipefail

          API="https://net-secondary.web.minecraft-services.net/api/v1.0/download/links"

          LATEST_URL="$(curl -fsSL "$API" | jq -r '.result.links[] | select(.downloadType=="serverBedrockLinux") | .downloadUrl')"

          if [ -z "$LATEST_URL" ] || [ "$LATEST_URL" = "null" ]; then
            echo "No Linux Bedrock server URL found"
            exit 1
          fi

          echo "latest_url=$LATEST_URL" >> "$GITHUB_OUTPUT"

          if [[ "$LATEST_URL" =~ bedrock-server-([0-9.]+)\.zip ]]; then
            echo "latest_bds_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Could not parse version from: $LATEST_URL"
            exit 1
          fi

      - name: Read current versions
        id: current
        run: |
          set -euo pipefail

          ADDIR="minecraftserver"

          echo "cur_url=$(yq -r '.args.BDS_URL' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"
          echo "cur_bds_version=$(yq -r '.args.BDS_VERSION' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"
          echo "addon_version=$(yq -r '.version' "$ADDIR/config.yaml")" >> "$GITHUB_OUTPUT"
          echo "easy_add=$(yq -r '.args.EASY_ADD_VERSION' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"
          echo "entrypoint_demoter=$(yq -r '.args.ENTRYPOINT_DEMOTER_VERSION' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"
          echo "set_property=$(yq -r '.args.SET_PROPERTY_VERSION' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"
          echo "restify=$(yq -r '.args.RESTIFY_VERSION' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"
          echo "mc_monitor=$(yq -r '.args.MC_MONITOR_VERSION' "$ADDIR/build.yaml")" >> "$GITHUB_OUTPUT"

      - name: Decide if Bedrock update is needed
        id: decide_bds
        run: |
          if [ "${{ steps.upstream.outputs.latest_url }}" = "${{ steps.current.outputs.cur_url }}" ]; then
            echo "bds_update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "bds_update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Bedrock fields in build.yaml
        if: steps.decide_bds.outputs.bds_update_needed == 'true'
        run: |
          set -euo pipefail

          ADDIR="minecraftserver"
          NEW_URL="${{ steps.upstream.outputs.latest_url }}"
          NEW_VER="${{ steps.upstream.outputs.latest_bds_version }}"

          yq -i ".args.BDS_URL = \"$NEW_URL\"" "$ADDIR/build.yaml"
          yq -i ".args.BDS_VERSION = \"$NEW_VER\"" "$ADDIR/build.yaml"

      - name: Check for add-on updates
        id: check_addons
        run: |
          set -euo pipefail

          ADDIR="minecraftserver"
          UPDATED=false
          CHANGELOG_FILE="$(mktemp)"

          declare -A ADDONS=(
            ["EASY_ADD"]="${{ steps.current.outputs.easy_add }}"
            ["ENTRYPOINT_DEMOTER"]="${{ steps.current.outputs.entrypoint_demoter }}"
            ["SET_PROPERTY"]="${{ steps.current.outputs.set_property }}"
            ["RESTIFY"]="${{ steps.current.outputs.restify }}"
            ["MC_MONITOR"]="${{ steps.current.outputs.mc_monitor }}"
          )

          for ADDON in "${!ADDONS[@]}"; do
            REPO_NAME="${ADDON,,}"

            case "$REPO_NAME" in
              set_property) REPO_NAME="set-property" ;;
              easy_add) REPO_NAME="easy-add" ;;
              mc_monitor) REPO_NAME="mc-monitor" ;;
              entrypoint_demoter) REPO_NAME="entrypoint-demoter" ;;
            esac

            LATEST="$(curl -fsSL "https://api.github.com/repos/itzg/$REPO_NAME/releases/latest" | jq -r '.tag_name | ltrimstr("v")')"
            CURRENT="${ADDONS[$ADDON]}"

            if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
              echo "No latest release found for $ADDON"
              exit 1
            fi

            if [ "$LATEST" != "$CURRENT" ]; then
              yq -i ".args.${ADDON}_VERSION = \"$LATEST\"" "$ADDIR/build.yaml"
              UPDATED=true
              echo "- Updated $ADDON from '$CURRENT' to '$LATEST'" >> "$CHANGELOG_FILE"
            fi
          done

          echo "addons_updated=$UPDATED" >> "$GITHUB_OUTPUT"

          {
            echo "addons_changelog<<EOF"
            cat "$CHANGELOG_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Decide if any update is needed
        id: decide_any
        run: |
          if [ "${{ steps.decide_bds.outputs.bds_update_needed }}" = "true" ] || [ "${{ steps.check_addons.outputs.addons_updated }}" = "true" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update addon version patch bump
        if: steps.decide_any.outputs.update_needed == 'true'
        id: bump
        run: |
          set -euo pipefail

          ADDIR="minecraftserver"
          CUR_ADDON_VER="${{ steps.current.outputs.addon_version }}"

          IFS='.' read -r MAJ MIN PAT <<< "$CUR_ADDON_VER"
          PAT=$((PAT + 1))

          NEW_ADDON_VER="${MAJ}.${MIN}.${PAT}"

          yq -i ".version = \"$NEW_ADDON_VER\"" "$ADDIR/config.yaml"

          echo "new_addon_version=$NEW_ADDON_VER" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        if: steps.decide_any.outputs.update_needed == 'true'
        run: |
          set -euo pipefail

          ADDIR="minecraftserver"
          VER="${{ steps.bump.outputs.new_addon_version }}"
          NOW="$(TZ=Europe/Amsterdam date +%Y-%m-%d)"
          CHANGELOG_PATH="$ADDIR/CHANGELOG.md"

          {
            echo "## ${VER} - ${NOW}"

            if [ "${{ steps.decide_bds.outputs.bds_update_needed }}" = "true" ]; then
              echo "- Updated Bedrock Server from '${{ steps.current.outputs.cur_bds_version }}' to '${{ steps.upstream.outputs.latest_bds_version }}'"
            fi

            cat <<'EOF'
          ${{ steps.check_addons.outputs.addons_changelog }}
          EOF

            echo

            if [ -f "$CHANGELOG_PATH" ]; then
              cat "$CHANGELOG_PATH"
            else
              echo "# Changelog"
            fi
          } > "${CHANGELOG_PATH}.new"

          mv "${CHANGELOG_PATH}.new" "$CHANGELOG_PATH"

      - name: Commit changes
        if: steps.decide_any.outputs.update_needed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add minecraftserver/build.yaml minecraftserver/config.yaml minecraftserver/CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(minecraftserver): release ${{ steps.bump.outputs.new_addon_version }}"
          git push

      - name: Create tag
        if: steps.decide_any.outputs.update_needed == 'true'
        run: |
          set -euo pipefail

          TAG="minecraftserver-v${{ steps.bump.outputs.new_addon_version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 0
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.decide_any.outputs.update_needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: minecraftserver-v${{ steps.bump.outputs.new_addon_version }}
          name: minecraftserver v${{ steps.bump.outputs.new_addon_version }}
          generate_release_notes: true
          body: |
            Bedrock Server updated to ${{ steps.upstream.outputs.latest_bds_version }}.
            Add-on version: ${{ steps.bump.outputs.new_addon_version }}.

            ${{ steps.check_addons.outputs.addons_changelog }}

            See changelog in minecraftserver/CHANGELOG.md.
